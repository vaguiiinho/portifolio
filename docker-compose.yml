services:
  frontend:
    container_name: frontend
    build: ./frontend
    env_file:
      - ./.env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
  backend:
    container_name: backend
    build: ./backend
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql://root:password@database/portifolio_db
    volumes:
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "3001:3001"
    extra_hosts:
    - "host.docker.internal:host-gateway"  
  database:
    container_name: database
    image: postgres:latest
    env_file:
      - ./.env
    volumes:
      - ./db_data/:/var/lib/postgresql/18/data
    ports:
      - "5432:5432"

volumes:
  db_data:
